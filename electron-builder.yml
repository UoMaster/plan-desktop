appId: com.example.vue-electron-app
productName: Vue Electron App
copyright: Copyright © 2024
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  category: Utility
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
